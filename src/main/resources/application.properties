spring.application.name=car-rental-rest-api

# Server config
server.port=8080

# H2 in-memory datasource
spring.datasource.url=jdbc:h2:mem:car_rental_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Enable H2 console (accessible at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Load data.sql after schema creation
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Default pagination settings
spring.data.web.pageable.default-page-size=5
spring.data.web.pageable.max-page-size=50
